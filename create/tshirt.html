<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Create T-Shirt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="/assets/css/mobile.css" />
  <style>
    /* minimal page-specific helpers (keep or move to your css) */
    .wrap { max-width: 900px; margin: 0 auto; padding: 12px 12px 88px; }
    header { display:flex; align-items:center; gap:12px; padding:8px 0; }
    header img { height:28px; }
    .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
    .toolbar .row { display:flex; gap:10px; align-items:center; }
    .panel { border:1px solid #e5e7eb; border-radius:12px; padding:12px; background:#fff; }
    .layers { max-height:180px; overflow:auto; border:1px solid #e5e7eb; border-radius:10px; padding:6px; }
    .layer { display:flex; align-items:center; justify-content:space-between; padding:8px; border-radius:8px; }
    .layer.active { background:#f3f4f6; }
    .layer .actions button { margin-left:6px; }
    .canvas-wrap { display:block; }
    canvas { width:100%; height:auto; background:#fff; border-radius:12px; border:1px solid #e5e7eb; }
    .sticky-cta { position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #e5e7eb; padding:10px 12px; display:flex; gap:10px; align-items:center; }
    .sticky-cta .right { margin-left:auto; display:flex; gap:10px; }
    .badge { font-size:.85rem; padding:6px 8px; border-radius:999px; border:1px solid #e5e7eb; }
    .badge.good { background:#ecfdf5; border-color:#10b981; }
    .badge.warn { background:#fffbeb; border-color:#f59e0b; }
    .badge.bad  { background:#fef2f2; border-color:#ef4444; }
    select, input[type="color"], input[type="range"] { width:100%; }
    @media (min-width:720px){
      .toolbar { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="/"><img src="/assets/icons/icon-192.png" alt="Logo"></a>
      <h1 style="margin:0;font-size:1.1rem;">Create Your T-Shirt</h1>
    </header>

    <!-- Variant (color) chooser -->
    <div class="panel">
      <div class="row" style="gap:12px;">
        <label for="variant-color" style="min-width:120px;">Shirt Color</label>
        <select id="variant-color" aria-label="Shirt color"></select>
      </div>
    </div>

    <!-- Canvas -->
    <div class="panel canvas-wrap">
      <canvas id="c"></canvas>
    </div>

    <!-- Tools -->
    <div class="toolbar">
      <div class="panel">
        <div class="row">
          <label for="add-img">Add Image</label>
          <input id="add-img" type="file" accept="image/*" />
        </div>
        <div class="row">
          <button id="add-text" class="btn" type="button">Add Text</button>
        </div>
        <div class="row">
          <span class="badge" id="dpi-badge" title="Estimated print PPI">— PPI</span>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <label for="font-select">Font</label>
          <select id="font-select" disabled></select>
        </div>
        <div class="row">
          <label for="text-color" style="min-width:120px;">Text Color</label>
          <input id="text-color" type="color" value="#ffffff" disabled />
        </div>
        <div class="row">
          <label for="text-outline" style="min-width:120px;">Text Outline</label>
          <input id="text-outline" type="color" value="#000000" disabled />
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <label for="size-slider" style="min-width:120px;">Size</label>
          <input id="size-slider" type="range" min="5" max="300" value="100" />
        </div>
        <div class="row">
          <label for="rotate-slider" style="min-width:120px;">Rotate</label>
          <input id="rotate-slider" type="range" min="0" max="359" value="0" />
        </div>
      </div>
    </div>

    <!-- Layers -->
    <div class="panel">
      <h2 style="margin:0 0 8px;font-size:1rem;">Layers</h2>
      <div id="layers" class="layers" aria-live="polite"></div>
    </div>
  </div>

  <!-- Sticky actions -->
  <div class="sticky-cta">
    <div class="left">
      <strong>Design</strong> — make sure content stays in the safe area.
    </div>
    <div class="right">
      <button id="save-design" class="btn secondary" type="button">Save</button>
      <button id="checkout" class="btn" type="button">Checkout</button>
    </div>
  </div>

  <!-- Fabric.js and your customizer -->
  <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
  <script type="module" src="/assets/js/customizer.js"></script>
</body>
</html>
